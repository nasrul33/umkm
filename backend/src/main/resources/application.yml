spring:
  application:
    name: sia-umkm-premium
  datasource:
    url: jdbc:postgresql://localhost:5432/siaumkm
    username: ${DB_USER:siaumkm}
    password: ${DB_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: validate   # skema dikelola Flyway, JANGAN pakai update/create-drop
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

# NFR-09: konfigurasi retry bawaan Spring Boot 4.1 untuk panggilan ke API PJAP mitra.
# Detail per-provider (base-url, api-key) diisi per instalasi klien via .env — lihat
# artifacts/client-onboarding-checklist.md, jangan hardcode di sini.
siaumkm:
  tax:
    # Rasio peringatan ambang omzet (BR-B5-03). Parameter monitoring PRODUK,
    # bukan parameter regulasi — karenanya di sini, BUKAN di tabel tax_rule.
    omzet-warning-ratio: ${OMZET_WARNING_RATIO:0.80}
    # Hari jatuh tempo setor-sendiri PPh Final masa (tanggal 15 bulan
    # berikutnya per PMK 164/2023) — dipakai entri tax_calendar.
    jatuh-tempo-setor-hari: ${JATUH_TEMPO_SETOR_HARI:15}
  security:
    # SENGAJA tanpa nilai default: aplikasi harus gagal start bila JWT_SECRET
    # tidak di-set (min. 32 karakter, unik per instalasi klien) — temuan
    # KRITIS audit keamanan: default ter-commit = token bisa dipalsukan.
    jwt-secret: ${JWT_SECRET}
    jwt-expiry-minutes: ${JWT_EXPIRY_MINUTES:480}
    # NFR-05: kunci AES-256 enkripsi kolom sensitif (NPWP/NIK). SENGAJA tanpa
    # default — gagal start bila tidak di-set. Generate: openssl rand -base64 32
    field-encryption-key: ${FIELD_ENCRYPTION_KEY}
  pjap:
    provider: ${PJAP_PROVIDER:}
    base-url: ${PJAP_BASE_URL:}
    api-key: ${PJAP_API_KEY:}
    retry:
      max-attempts: 3
      backoff-ms: 2000

logging:
  level:
    com.siaumkm: INFO
